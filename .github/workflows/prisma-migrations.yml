name: Prisma Migrations

on:
  pull_request:
    branches: ["main"]
    paths:
      - "packages/db/prisma/**"

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sourcebot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sourcebot
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"
          # full history so we can diff migrations against the merge base
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install
        run: yarn install --frozen-lockfile

      # Check 1: migrations apply cleanly in order AND reproduce schema.prisma.
      # `migrate diff` exits 2 when the applied migration history drifts from the schema.
      - name: Apply migrations
        working-directory: packages/db
        run: yarn prisma migrate deploy

      - name: Check for schema drift
        working-directory: packages/db
        run: |
          yarn prisma migrate diff \
            --from-database \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code \
          && echo "✅ No drift: migrations reproduce schema.prisma" \
          || (echo "❌ schema.prisma has changes not captured in a migration. Run: yarn dev:prisma:migrate:dev --name <name>" && exit 1)

      # Check 2: no new migration has a timestamp earlier than the latest on main.
      - name: Check migration ordering
        run: |
          MIG_DIR=packages/db/prisma/migrations
          # latest timestamp already on main
          git fetch origin main --depth=1
          LATEST_ON_MAIN=$(git ls-tree -r --name-only origin/main -- "$MIG_DIR" \
            | sed -n "s#$MIG_DIR/\([0-9]\{14\}\)_.*#\1#p" | sort | tail -1)
          echo "Latest migration on main: ${LATEST_ON_MAIN:-<none>}"
          # migrations added in this PR (present locally, not on main)
          NEW=$(comm -23 \
            <(ls "$MIG_DIR" | sed -n 's/^\([0-9]\{14\}\)_.*/\1/p' | sort -u) \
            <(git ls-tree -r --name-only origin/main -- "$MIG_DIR" | sed -n "s#$MIG_DIR/\([0-9]\{14\}\)_.*#\1#p" | sort -u))
          FAIL=0
          for ts in $NEW; do
            if [ -n "$LATEST_ON_MAIN" ] && [ "$ts" -lt "$LATEST_ON_MAIN" ]; then
              echo "❌ New migration $ts predates latest migration on main ($LATEST_ON_MAIN). Rename it with a current timestamp."
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "✅ Migration ordering OK"
          exit $FAIL
